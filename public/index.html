<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#09070d" />
    <title>UNVEIL</title>
    <!--
      This file exists only as a passive fallback inside the native Capacitor
      bundle. In production the Capacitor WebView loads server.url
      (https://unveil.best) directly, so this HTML is never rendered. It must
      NEVER perform a top-level navigation — on Android WebView, a
      window.location.replace to an external https origin is treated as an
      external-intent navigation and hands the user off to Chrome, ejecting
      them from MainActivity. That was the App Store / Play Store rejection.
    -->
    <style>
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #09070d; color: #f5f3ff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden; -webkit-user-select: none; user-select: none;
      }
      #splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 24px;
        background: radial-gradient(ellipse at center, rgba(139,92,246,0.15) 0%, #09070d 60%);
      }
      #splash h1 {
        font-size: 28px; font-weight: 600; letter-spacing: 0.4em; margin: 0; opacity: 0.92;
      }
      #splash .dot {
        width: 6px; height: 6px; border-radius: 50%; background: #8b5cf6;
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.25; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1.15); }
      }
    </style>
  </head>
  <body>
    <div id="splash" role="status" aria-label="Loading UNVEIL">
      <h1>UNVEIL</h1>
      <div class="dot"></div>
    </div>
    <!-- No JS. No redirect. Capacitor server.url owns navigation. -->
  </body>
</html>
