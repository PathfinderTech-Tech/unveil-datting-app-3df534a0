<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#09070d" />
    <title>UNVEIL — Connection Error</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #09070d;
        color: #f8f4ff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        background:
          radial-gradient(circle at 50% 24%, rgba(236, 72, 153, 0.18), transparent 34%),
          radial-gradient(circle at 18% 82%, rgba(245, 158, 11, 0.12), transparent 32%),
          #09070d;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid rgba(216, 180, 254, 0.34);
        border-radius: 28px;
        background: rgba(24, 16, 32, 0.94);
        padding: 32px;
        text-align: center;
        box-shadow: 0 0 80px rgba(168, 85, 247, 0.24);
      }

      .brand {
        margin-bottom: 16px;
        font-size: 28px;
        letter-spacing: 0.28em;
      }

      h1 {
        margin: 0;
        font-size: 21px;
      }

      p {
        margin: 12px 0 0;
        color: rgba(248, 244, 255, 0.72);
        line-height: 1.5;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-top: 24px;
      }

      button,
      a {
        appearance: none;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
      }

      button {
        border: 0;
        background: linear-gradient(135deg, #8b5cf6, #ec4899, #f59e0b);
        color: white;
      }

      a {
        border: 1px solid rgba(216, 180, 254, 0.35);
        background: rgba(255, 255, 255, 0.06);
        color: #f8f4ff;
      }
    </style>
  </head>
  <body>
    <main role="alert">
      <div class="brand">UNVEIL</div>
      <h1>UNVEIL could not reach the live app</h1>
      <p>Check your connection, then retry. This fallback prevents a silent black screen if the native shell cannot load the hosted experience.</p>
      <div class="actions">
        <button type="button" onclick="window.location.href='https://unveil.best/'">Retry</button>
        <a href="mailto:support@unveil.best?subject=UNVEIL%20startup%20issue">Support</a>
      </div>
    </main>
  </body>
</html>
