name: Android Release Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build web bundle
        run: bun run build

      - name: Sync Capacitor Android
        # Regenerates android/capacitor-cordova-android-plugins/* (including
        # cordova.variables.gradle) and copies dist/client into the native shell.
        run: bunx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Android App Bundle
        working-directory: android
        run: ./gradlew clean bundleRelease

      - name: Verify AAB exists
        run: test -f android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
