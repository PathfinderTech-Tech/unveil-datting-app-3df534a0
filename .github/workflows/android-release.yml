name: Android Release Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Show environment
        run: |
          echo "PWD: $(pwd)"
          echo "Node: $(node -v)"
          echo "Bun: $(bun -v)"
          ls -la

      - name: Install JS dependencies
        # Do NOT use --frozen-lockfile: it aborts if bun.lock drifts from package.json,
        # producing an empty node_modules and a silently-failing build downstream.
        run: bun install

      - name: Build web bundle (vite build)
        # `bun run build` -> `vite build` (TanStack Start / Nitro). Pipe through
        # `tee` so full logs are visible in the CI console even if vite exits nonzero.
        run: |
          set -o pipefail
          bun run build 2>&1 | tee build.log
          echo "vite build exit code: $?"

      - name: Copy web bundle to dist/client
        # TanStack Start / Nitro writes client assets to .output/public/.
        # Capacitor's webDir (and downstream steps) expect dist/client/.
        run: |
          mkdir -p dist/client
          cp -r .output/public/. dist/client/

      - name: Diagnose build output
        if: always()
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== ls -la (repo root) ==="
          ls -la
          echo "=== ls -la dist ==="
          ls -la dist || true
          echo "=== ls -la dist/client ==="
          ls -la dist/client || true
          echo "=== find dist -maxdepth 3 -type f ==="
          find dist -maxdepth 3 -type f || true

      - name: Verify web bundle exists
        run: test -f dist/client/index.html

      - name: Sync Capacitor Android
        # Regenerates android/capacitor-cordova-android-plugins/* (including
        # cordova.variables.gradle) and copies dist/client into the native shell.
        run: bunx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Android App Bundle
        working-directory: android
        run: ./gradlew clean bundleRelease

      - name: Verify AAB exists
        run: test -f android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
