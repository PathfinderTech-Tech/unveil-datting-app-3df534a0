name: Verify Production

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to verify (default: https://unveil.best)'
        required: false
        default: 'https://unveil.best'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Run Production Verification
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run production verification
        id: verify
        run: node scripts/verify-production.mjs "${{ github.event.inputs.base_url || 'https://unveil.best' }}" --html=verify-report.html
        env:
          NODE_NO_WARNINGS: 1

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-report
          path: verify-report.html
          retention-days: 30

      - name: Comment PR with summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('verify-report.html', 'utf-8');
            const passed = (report.match(/class="pill pass"/g) || []).length;
            const failed = (report.match(/class="pill fail"/g) || []).length;
            const total = passed + failed;
            const status = failed > 0 ? '❌ Failed' : '✅ Passed';
            const body = `## ${status} — Production Verification\n\n` +
              `**URL:** ${process.env.BASE_URL || 'https://unveil.best'}\n` +
              `**Checks:** ${total - failed}/${total} passed\n\n` +
              `📄 [Download full HTML report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
