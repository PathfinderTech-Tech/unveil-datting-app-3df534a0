name: Verify Production

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to verify (default: https://unveil.best)'
        required: false
        default: 'https://unveil.best'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Run Production Verification
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run production verification
        id: verify
        run: node scripts/verify-production.mjs "${{ github.event.inputs.base_url || 'https://unveil.best' }}" --html=verify-report.html
        env:
          NODE_NO_WARNINGS: 1

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-report
          path: verify-report.html
          retention-days: 30

      - name: Comment PR with summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('verify-report.html', 'utf-8');

            // Count individual check rows (not summary pills)
            const passRows = report.match(/<tr class="pass">/g) || [];
            const failRows = report.match(/<tr class="fail">/g) || [];
            const passed = passRows.length;
            const failed = failRows.length;
            const total = passed + failed;

            // Extract failed check names from second <td> of each fail row
            const failRegex = /<tr class="fail">[\s\S]*?<td>[^<]*<\/td>\s*<td>([^<]+)<\/td>/g;
            const failedNames = [];
            let m;
            while ((m = failRegex.exec(report)) !== null) {
              failedNames.push(m[1].trim());
            }

            const status = failed > 0 ? '❌ Failed' : '✅ Passed';
            const url = process.env.BASE_URL || 'https://unveil.best';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            let body = `## ${status} — Production Verification\n\n` +
              `**URL:** ${url}\n` +
              `**Total:** ${total} checks\n` +
              `**Passed:** ${passed}\n` +
              `**Failed:** ${failed}\n`;

            if (failedNames.length > 0) {
              body += `\n### Failed Checks\n`;
              for (const name of failedNames) {
                body += `- ${name}\n`;
              }
            }

            body += `\n📄 [View full HTML report](${runUrl})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
